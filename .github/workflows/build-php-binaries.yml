name: Build PHP Binaries

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build (e.g. 8.4.18)'
        required: true
        default: '8.4.18'

permissions:
  contents: read
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: ubuntu22, image: 'ubuntu:22.04', runner: ubuntu-latest,      suffix: '' }
          - { target: ubuntu24, image: 'ubuntu:24.04', runner: ubuntu-latest,      suffix: '' }
          - { target: debian12, image: 'debian:12',    runner: ubuntu-latest,      suffix: '' }
          - { target: debian13, image: 'debian:13',    runner: ubuntu-latest,      suffix: '' }
          - { target: ubuntu22, image: 'ubuntu:22.04', runner: ubuntu-24.04-arm,   suffix: '-aarch64' }
          - { target: ubuntu24, image: 'ubuntu:24.04', runner: ubuntu-24.04-arm,   suffix: '-aarch64' }
          - { target: debian12, image: 'debian:12',    runner: ubuntu-24.04-arm,   suffix: '-aarch64' }
          - { target: debian13, image: 'debian:13',    runner: ubuntu-24.04-arm,   suffix: '-aarch64' }
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential autoconf bison re2c pkg-config curl ca-certificates file openssh-client \
            libxml2-dev libssl-dev libsqlite3-dev libcurl4-openssl-dev libonig-dev libzip-dev \
            libpng-dev libjpeg-dev libwebp-dev libicu-dev libsodium-dev libxslt1-dev \
            libreadline-dev zlib1g-dev
          apt-get install -y libfreetype-dev || apt-get install -y libfreetype6-dev

      - name: Download PHP source
        run: |
          VER="${{ inputs.php_version }}"
          curl -fsSL "https://www.php.net/distributions/php-${VER}.tar.bz2" -o "php-${VER}.tar.bz2"
          tar xjf "php-${VER}.tar.bz2"

      - name: Configure and build
        run: |
          VER="${{ inputs.php_version }}"
          cd "php-${VER}"
          CFG="--prefix=/usr/local/php --with-config-file-path=/usr/local/php/etc --with-config-file-scan-dir=/usr/local/php/conf.d \
            --enable-fpm --with-fpm-user=www --with-fpm-group=www \
            --enable-mysqlnd --with-mysqli=mysqlnd --with-pdo-mysql=mysqlnd \
            --with-freetype --with-jpeg --with-webp --with-zlib --enable-gd \
            --enable-xml --disable-rpath --enable-bcmath --enable-shmop --enable-sysvsem \
            --with-curl --enable-mbregex --enable-mbstring --enable-intl --enable-pcntl \
            --enable-ftp --with-openssl --enable-sockets --with-zip --enable-soap \
            --with-gettext --enable-exif --enable-opcache --with-xsl --with-sodium --with-readline"
          ./configure ${CFG} --with-pear || ./configure ${CFG}
          make -j"$(nproc)"
          make install

      - name: Sanity check
        run: |
          /usr/local/php/bin/php -v
          echo "modules: $(/usr/local/php/bin/php -m | grep -vc '^\[')"
          /usr/local/php/sbin/php-fpm -v

      - name: Strip and package
        run: |
          VER="${{ inputs.php_version }}"
          find /usr/local/php -type f \( -name '*.so' -o -perm -111 \) -exec sh -c \
            'file -b "$1" | grep -q ELF && strip --strip-unneeded "$1" || true' _ {} \; 2>/dev/null || true
          tar czf "/tmp/php-${VER}-bin-${{ matrix.target }}${{ matrix.suffix }}.tar.gz" -C /usr/local php
          ls -lh "/tmp/php-${VER}-bin-${{ matrix.target }}${{ matrix.suffix }}.tar.gz"

      - name: Upload to mirror
        env:
          SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          VER="${{ inputs.php_version }}"
          MM=$(echo "${VER}" | cut -d. -f1,2)
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_mirror
          chmod 600 ~/.ssh/id_mirror
          SSH_OPTS="-i $HOME/.ssh/id_mirror -o StrictHostKeyChecking=accept-new"
          ssh ${SSH_OPTS} root@47.122.115.39 "mkdir -p /data/mirror/php"
          scp ${SSH_OPTS} "/tmp/php-${VER}-bin-${{ matrix.target }}${{ matrix.suffix }}.tar.gz" root@47.122.115.39:/data/mirror/php/
          if [ "${{ matrix.target }}" = "ubuntu22" ] && [ -z "${{ matrix.suffix }}" ]; then
            scp ${SSH_OPTS} "php-${VER}/php.ini-production" "root@47.122.115.39:/data/mirror/php/php.ini-production-${MM}"
          fi
          echo "uploaded php-${VER}-bin-${{ matrix.target }}${{ matrix.suffix }}.tar.gz"

  refresh-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync-checksums
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-checksums.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "sync-checksums dispatched"
